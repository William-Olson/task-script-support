name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node Env
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm ci

      - name: Audit Check
        run: npm audit

      - name: Build Project
        run: npm run build

      - name: Lint Code
        run: npm run lint

      - name: Check Formating
        run: npm run format-check

      - name: Run Tests
        run: npm run test
